<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Valentinstag - Anonyme Nachricht senden</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff6b9d 0%,#c06c84 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.container{background:#fff;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:500px;width:100%}h1{color:#ff6b9d;text-align:center;margin-bottom:10px;font-size:2em}.subtitle{text-align:center;color:#c06c84;margin-bottom:30px;font-size:1.2em;font-weight:700}.anonymous-badge{background:#ff6b9d;color:#fff;padding:10px 20px;border-radius:25px;text-align:center;margin-bottom:30px;font-weight:700;font-size:1.1em}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;color:#333;font-weight:700}input[type=email],textarea{width:100%;padding:12px;border:2px solid #ffc2d4;border-radius:8px;font-size:16px;transition:border-color .3s}input[type=email]:focus,textarea:focus{outline:none;border-color:#ff6b9d}textarea{resize:vertical;min-height:150px;font-family:Arial,sans-serif}button{width:100%;padding:15px;background:linear-gradient(135deg,#ff6b9d 0%,#c06c84 100%);color:#fff;border:none;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}button:hover{transform:scale(1.02)}button:active{transform:scale(.98)}.message{padding:15px;border-radius:8px;margin-top:20px;text-align:center;display:none}.message.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}.message.error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}.info-text{text-align:center;color:#666;font-size:.9em;margin-top:20px}.heart{color:#ff6b9d;animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}</style></head><body><div class="container"><h1>❤️ Valentinstag ❤️</h1><p class="subtitle">Sende eine anonyme Nachricht</p><div class="anonymous-badge">🔒 100% ANONYM 🔒</div><form id="messageForm"><div class="form-group"><label for="toEmail">An (E-Mail-Adresse):</label><input type="email" id="toEmail" name="toEmail" required placeholder="liebe@example.com"></div><div class="form-group"><label for="message">Deine Nachricht:</label><textarea id="message" name="message" required placeholder="Schreibe hier deine anonyme Valentinstag-Nachricht..."></textarea></div><button type="submit">Nachricht senden <span class="heart">❤️</span></button></form><div id="responseMessage" class="message"></div><p class="info-text">Keine Registrierung erforderlich. Deine Nachricht wird komplett anonym versendet.</p></div><script>document.getElementById('messageForm').addEventListener('submit',async function(e){e.preventDefault();const f=new FormData(this),r=document.getElementById('responseMessage'),b=this.querySelector('button');b.disabled=true;b.textContent='Wird gesendet...';try{const res=await fetch('send.php',{method:'POST',body:f}),result=await res.json();r.style.display='block';if(result.success){r.className='message success';r.textContent=result.message;this.reset();}else{r.className='message error';r.textContent=result.message;}}catch(err){r.style.display='block';r.className='message error';r.textContent='Ein Fehler ist aufgetreten. Bitte versuche es später erneut.';}b.disabled=false;b.innerHTML='Nachricht senden <span class="heart">❤️</span>';});</script></body></html>
